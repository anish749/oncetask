name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24.x', '1.25.x']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true

    - name: Download dependencies
      run: go mod download

    - name: Run tests
      run: go test -v -race ./...

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        # Get the previous tag
        PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
        if [ -z "$PREV_TAG" ]; then
          # First release — include all commits
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${{ github.ref_name }})
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${{ github.ref_name }}")
        fi
        # Write to file to avoid delimiter issues
        echo "$CHANGELOG" > changelog.txt

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        body_path: changelog.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Trigger Go module proxy
      run: |
        GOPROXY=https://proxy.golang.org GO111MODULE=on \
          go install github.com/anish749/oncetask@${{ github.ref_name }} 2>/dev/null || true
